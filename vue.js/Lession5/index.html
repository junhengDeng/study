<header>
  <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script>
</header>

<body>
  <div id="app">
    <div v-bind:class="{ active: isActive }">fd</div>
    <div class="static" v-bind:class="{ active: isActive, 'text-danger': hasError }" :style="styleObject"></div>
    <div v-bind:class="classObject" :style="{color: acitveColor}"></div>
  </div>
  <script>
    new Vue({
      el: '#app',
      data: {
        isActive: true,
        hasError: false,
        classObject: {
          active: true,
          'text-danger': false
        },
        acitveColor: 'red',
        styleObject: {
          color: 'red',
          fontSize: '13px'
        }
      }
    })
  </script>
</body>
