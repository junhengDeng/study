<header>
  <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script>
</header>

<body>
  <div id="app">
    <base-input ></base-input>
  </div>
  <script>
    Vue.component('base-input', {
      template: `<label>{{label}}
          <input 
            v-bind="$attrs"
            v-bind:value="value"
            @input="$emit('input', $event.target.value)"
          >
        </label>`
    })
    new Vue({
      el: '#app',

    })
  </script>
</body>
