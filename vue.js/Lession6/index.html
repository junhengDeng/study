<header>
  <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script>
</header>

<body>
  <ul id="v-for-object" class="demo">
    <li v-for="(value,name, index) in object">
      {{  index + ':' +  value }}
    </li>
  </ul>
  <script>
    new Vue({
      el: '#v-for-object',
      data: {
        object: {
          title: 'How to do lists in Vue',
          author: 'Jane Doe',
          publishedAt: '2016-04-10'
        }
      }
    })
  </script>
</body>
