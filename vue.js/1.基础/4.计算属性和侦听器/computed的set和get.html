<header>
  <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script>
</header>

<body>
  <div id="app">
    <div>
      <span>{{firstName}}</span>
      <br>
      <span>{{lastName}}</span>
      <p>{{fullName}}</p>
    </div>
  </div>
  <script>
    let vm = new Vue({
      el: '#app',
      data: {
        firstName: 'deng',
        lastName: 'junheng'
      },
      computed: {
        fullName: {
          get() {
            return this.firstName + ' ' + this.lastName
          },
          set(newValue) {
            var names = newValue.split(' ')
            this.firstName = names[0];
            this.lastName = names[1];
          }
        }
      }
    })
  </script>
</body>
