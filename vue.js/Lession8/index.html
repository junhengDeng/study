<header>
  <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script>
</header>

<body>
  <div id="app">
    <demo-input v-model="value"></demo-input>
    <span>{{ value }}</span>
  </div>
  <script>
  
    Vue.components('demo-input', {
      props: ['value'],
      template: `<input :value="value" @input="$emit('input', $event.target.value)"/>`
    })
    new Vue({
      el: '#app',
      data: {
        value: ''
      }
    })
  </script>
</body>
