<header>
  <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script>
</header>

<body>
  <div id="app">
    <customer-input v-model="msg"></customer-input>
    <span>{{msg}}</span>
  </div>
  <script>

    Vue.component('customer-input', {
      template: `<input :value="value" @input="$emit('input', $event.target.value)">`,
      props: ['value']
    })
    new Vue({
      el: '#app',
      data: {
        msg: ''
      }
    })
  </script>
</body>
