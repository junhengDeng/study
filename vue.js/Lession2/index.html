<header>
  <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script>
</header>

<body>
  <script>
    // watch可以取消
    new Vue({
      data: {
        a: 1
      },
      beforeCreate: function () {
        console.log('before')
      },
      created: function () {
        // `this` 指向 vm 实例
        console.log('a is: ' + this.a)
      }
    })
  </script>
</body>
